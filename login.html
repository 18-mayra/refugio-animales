<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Refugio</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        .codigo-section { display: none; }
        .mensaje { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>🐾 Refugio de Animales - Login</h2>
    
    <div id="loginSection">
        <input type="email" id="email" placeholder="Correo electrónico" value="psgm.3112@gmail.com">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="loginBtn">Iniciar Sesión</button>
    </div>
    
    <div id="codigoSection" class="codigo-section">
        <p>📧 Código enviado a: <strong id="userEmail"></strong></p>
        <input type="text" id="codigo" placeholder="Código de 6 dígitos" maxlength="6">
        <button id="verificarBtn">Verificar Código</button>
        <button id="volverBtn">Volver</button>
    </div>
    
    <div id="mensaje"></div>

    <script>
        const API_BASE_URL = window.location.origin;
        let userIdGlobal = null;

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById("mensaje");
            div.innerHTML = `<div class="mensaje ${tipo}">${texto}</div>`;
            setTimeout(() => div.innerHTML = "", 5000);
        }

        // Enviar credenciales
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            
            if (!email || !password) {
                mostrarMensaje("❌ Completa todos los campos", "error");
                return;
            }
            
            mostrarMensaje("📧 Enviando...", "exito");
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/usuarios/login/enviar-codigo`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.mensaje || data.error);
                
                userIdGlobal = data.userId;
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("codigoSection").style.display = "block";
                document.getElementById("userEmail").textContent = email;
                mostrarMensaje("✅ Código enviado a tu correo", "exito");
                
            } catch (error) {
                mostrarMensaje("❌ " + error.message, "error");
            }
        };
        
        // Verificar código
        document.getElementById("verificarBtn").onclick = async () => {
            const codigo = document.getElementById("codigo").value.trim();
            
            if (!codigo || codigo.length !== 6) {
                mostrarMensaje("❌ Ingresa el código de 6 dígitos", "error");
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/usuarios/login/verificar-codigo`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: userIdGlobal, codigo })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error);
                
                localStorage.setItem("accessToken", data.accessToken);
                if (data.refreshToken) localStorage.setItem("refreshToken", data.refreshToken);
                if (data.usuario) localStorage.setItem("usuario", JSON.stringify(data.usuario));
                
                mostrarMensaje("✅ ¡Bienvenido " + (data.usuario?.nombre || "") + "!", "exito");
                setTimeout(() => { window.location.href = "/"; }, 1500);
                
            } catch (error) {
                mostrarMensaje("❌ " + error.message, "error");
            }
        };
        
        // Volver
        document.getElementById("volverBtn").onclick = () => {
            document.getElementById("codigoSection").style.display = "none";
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("codigo").value = "";
        };
        
        // Verificar si ya hay sesión
        if (localStorage.getItem("accessToken")) {
            window.location.href = "/";
        }
    </script>
</body>
</html>
