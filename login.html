<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Refugio</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

<header>
    <nav class="menu" aria-label="Menú principal">
        <div class="logo">🐾 Refugio</div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <ul class="menu-links" id="menuLinks">
            <li><a href="index.html">Inicio</a></li>
            <li class="submenu">
                <button class="submenu-btn">Catálogo ▾</button>
                <ul class="submenu-links">
                    <li><a href="perros.html">Perros</a></li>
                    <li><a href="gatos.html">Gatos</a></li>
                </ul>
            </li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a href="contactanos.html">Contáctanos</a></li>
            <li><a href="refugio.html">Sobre el Refugio</a></li>
            <li class="login" id="authLink"></li>
        </ul>
    </nav>
</header>

<div class="login-wrapper">
    <div class="login-container">
        <h1>🔐 Iniciar Sesión</h1>

        <!-- SECCIÓN DE LOGIN (PASO 1) -->
        <div id="loginSection">
            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                
                <div class="password-container">
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="button" class="toggle-password" id="togglePasswordBtn">👁️</button>
                </div>

                <!-- CAPTCHA ALEATORIO -->
                <div class="captcha-container">
                    <label>Verificación: ¿Cuánto es <span id="captchaNum1">5</span> + <span id="captchaNum2">3</span>?</label>
                    <input type="number" id="captchaInput" placeholder="Escribe el resultado" required>
                    <input type="hidden" id="captchaResultado" value="8">
                </div>

                <button type="submit" id="loginBtn">Ingresar</button>
            </form>

            <p>¿No tienes cuenta? <a href="registro.html">Registrarse</a></p>
            <p><a href="recuperar.html" class="forgot-password">¿Olvidaste tu contraseña?</a></p>
        </div>

        <!-- SECCIÓN DEL CÓDIGO (PASO 2 - aparece después de enviar email) -->
        <div id="codigoSection" style="display: none;">
            <div class="codigo-section">
                <div class="user-email">
                    📧 Código enviado a: <strong id="userEmail"></strong>
                </div>
                
                <form id="codigoForm">
                    <input type="text" id="codigo" class="codigo-input" 
                           placeholder="000000" maxlength="6" autocomplete="off">
                    <button type="submit" class="btn" id="verificarBtn">VERIFICAR CÓDIGO</button>
                </form>
                
                <div class="timer">
                    ⏱️ Tiempo restante: <span id="timer">10:00</span>
                </div>
                
                <button type="button" class="btn-secondary" id="reenviarCodigo" disabled>Reenviar código</button>
                <button type="button" class="btn-secondary" id="volverLoginBtn">Volver</button>
            </div>
        </div>
    </div>
</div>

<script src="JS/api.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/login.js"></script>
<script src="JS/menu.js"></script>
</body>
</html>
