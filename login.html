<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Refugio</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/animations.css">
</head>
<body>

<header>
    <nav class="menu" aria-label="Menú principal">
        <div class="logo">🐾 Refugio</div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <ul class="menu-links" id="menuLinks">
            <li><a href="index.html">Inicio</a></li>
            <li class="submenu">
                <button class="submenu-btn">Catálogo ▾</button>
                <ul class="submenu-links">
                    <li><a href="perros.html">Perros</a></li>
                    <li><a href="gatos.html">Gatos</a></li>
                </ul>
            </li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a href="contactanos.html">Contáctanos</a></li>
            <li><a href="refugio.html">Sobre el Refugio</a></li>
            <li class="login" id="authLink"></li>
        </ul>
    </nav>
</header>

<div class="login-wrapper">
    <div class="login-container">
        <h1>🔐 Iniciar Sesión</h1>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            
            <div class="password-container">
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="button" class="toggle-password" onclick="togglePassword('password')"></button>
            </div>

            <!-- CAPTCHA ALEATORIO -->
            <div class="captcha-container">
                <label>Verificación: ¿Cuánto es <span id="captchaNum1">5</span> + <span id="captchaNum2">3</span>?</label>
                <input type="number" id="captchaInput" placeholder="Escribe el resultado" required>
                <input type="hidden" id="captchaResultado" value="8">
            </div>

            <button type="submit">Ingresar</button>
        </form>

        <p>¿No tienes cuenta? <a href="registro.html">Registrarse</a></p>
        <p><a href="recuperar.html" class="forgot-password">¿Olvidaste tu contraseña?</a></p>
    </div>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const btn = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            btn.textContent = "";
        } else {
            input.type = "password";
            btn.textContent = "";
        }
    }

    // Generar CAPTCHA aleatorio
    function generarCaptcha() {
        const num1 = Math.floor(Math.random() * 10) + 1; // 1-10
        const num2 = Math.floor(Math.random() * 10) + 1; // 1-10
        const resultado = num1 + num2;
        
        document.getElementById("captchaNum1").textContent = num1;
        document.getElementById("captchaNum2").textContent = num2;
        document.getElementById("captchaResultado").value = resultado;
    }

    // Generar CAPTCHA al cargar la página
    document.addEventListener("DOMContentLoaded", generarCaptcha);
</script>

<script src="JS/api.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/login.js"></script>
<script src="JS/menu.js"></script>
</body>
</html>
